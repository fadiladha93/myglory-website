<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Login | MyGlory International Sdn Bhd</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page" data-page="login">
  <main class="login-screen">
    <section class="login-card" aria-labelledby="login-title">
      <a class="login-logo" href="index.html" aria-label="Back to MyGlory International home">
        <img src="assets/images/logo.png" alt="MyGlory International logo">
      </a>
      <p class="eyebrow">Member Lounge</p>
      <h1 id="login-title">Member Login</h1>
      <p class="login-intro">Dummy login page for MyGlory International member access.</p>

      <form class="login-form" action="#" method="post">
        <label>
          <span>Username</span>
          <input type="text" name="username" placeholder="Enter username" autocomplete="username">
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Enter password" autocomplete="current-password">
        </label>
        <label>
          <span>Security Code</span>
          <input type="text" name="security-code" placeholder="Enter security code" inputmode="numeric" autocomplete="one-time-code">
        </label>
        <button class="btn btn-primary" type="button">Login</button>
      </form>

      <a class="forgot-password-link" href="#">Forgot Password?</a>
      <a class="login-back-link" href="index.html">Back to Home</a>
    </section>
  </main>
</body>
</html>
